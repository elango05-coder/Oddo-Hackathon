version: '3.8'

services:
  database:
    image: mongo:6.0
    container_name: assetflow-database
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://database:27017/assetflow
      - JWT_ACCESS_SECRET=super-secret-access-token-key-change-in-production
      - JWT_REFRESH_SECRET=super-secret-refresh-token-key-change-in-production
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - RATE_LIMIT_MAX=200
      - RATE_LIMIT_WINDOW_MS=900000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - database

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: assetflow-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
